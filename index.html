<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberano Builder V13 | Asistente Universal Pro</title>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .builder-container { max-width: 850px; width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        h1 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; font-size: 1.1rem; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; background: var(--glass); }
        label { color: var(--gold); font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: #fff; outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-generar { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.4s; font-size: 0.9rem;}
        .btn-generar:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        #codigo_salida { width: 100%; height: 250px; margin-top: 20px; background: #050505; color: #00ff41; font-family: monospace; border: 1px solid #444; padding: 10px; border-radius: 10px; display: none; font-size: 11px; }
    </style>
</head>
<body>

    <div class="builder-container">
        <h1>🛠️ SOBERANO BUILDER V13 (FLOAT EDITION)</h1>
        
        <div class="section">
            <label>Nombre del Negocio:</label>
            <input type="text" id="nombre_negocio" placeholder="Ej: Barbería Soberana">
            <label>WhatsApp Destino (Sin el +):</label>
            <input type="text" id="ws_num" placeholder="5493764362698">
        </div>

        <button class="btn-generar" onclick="fabricarCodigo()">Generar Asistente Universal 🚀</button>
        <textarea id="codigo_salida" readonly></textarea>
    </div>

<script>
    function fabricarCodigo() {
        const nombre = document.getElementById('nombre_negocio').value || "NEGOCIO";
        const ws = document.getElementById('ws_num').value;
        const avatar = "https://i.ibb.co/pjL8062t/ei-1776373504277-removebg-preview.png";

        if(!ws) return alert("Falta el WhatsApp de destino.");

        // El código que "escupe" el builder ahora incluye el botón flotante y la lógica de apertura/cierre
        const scriptCodigo = `<div id="sob_mod">
    <style>
        #sob_mod * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        #sob_mod #bot-launcher { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #000; border: 2px solid #D4AF37; border-radius: 50%; cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: 0.3s; }
        #sob_mod #bot-launcher:hover { transform: scale(1.1); }
        #sob_mod #bot-launcher img { width: 70%; height: 70%; object-fit: contain; }
        #sob_mod .s-c { display: none; position: fixed; bottom: 90px; right: 20px; width: 350px; max-width: calc(100% - 40px); border: 2px solid #D4AF37; padding: 15px; border-radius: 20px; background: #000; color: white; box-shadow: 0 10px 40px #000; z-index: 9998; animation: botUp 0.3s ease; }
        @keyframes botUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #sob_mod .chat-box { height:300px; overflow-y:auto; margin-bottom:15px; display:flex; flex-direction:column; scroll-behavior: smooth; }
        #sob_mod .chat-box::-webkit-scrollbar { width: 3px; }
        #sob_mod .chat-box::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        #sob_mod .msg { background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; border-left:3px solid #D4AF37; margin-bottom:10px; font-size:0.9rem; line-height:1.4; }
        #sob_mod .bot-h { display:flex; align-items:center; gap:12px; margin-bottom:12px; border-bottom:1px solid #222; padding-bottom:10px; position: relative; }
        #sob_mod .bot-img-h { width:40px; height:40px; border-radius:50%; border:1px solid #D4AF37; }
        #sob_mod .close-bot { position: absolute; right: 0; top: 0; cursor: pointer; color: #D4AF37; font-size: 1.2rem; }
        #sob_mod .s-i { width:100%; padding:14px; border:1px solid #D4AF37; border-radius:12px; background:#000; color:white; font-size:16px; margin-bottom:10px; outline:none; }
        #sob_mod .s-b { width:100%; padding:15px; background:#D4AF37; border:none; border-radius:12px; color:#000; font-weight:bold; cursor:pointer; text-transform:uppercase; }
        #sob_mod .txt-area { height: 80px; resize: none; }
        #sob_mod .brand-footer { text-align:center; font-size:0.55rem; color:#444; margin-top:10px; text-transform: uppercase; }
    </style>
    <div id="bot-launcher" onclick="toggleBot()"><img src="${avatar}"></div>
    <div class="s-c" id="bot-win">
        <div class="bot-h">
            <img src="${avatar}" class="bot-img-h">
            <div>
                <div style="font-weight:bold; font-size:0.85rem;">Asistente Virtual</div>
                <div style="font-size:0.6rem; color:#00ff41;">● En línea para ${nombre}</div>
            </div>
            <span class="close-bot" onclick="toggleBot()">×</span>
        </div>
        <div id="box" class="chat-box"></div>
        <div id="iarea">
            <input type="text" id="in_n" class="s-i" placeholder="¿Cuál es tu nombre?">
            <button class="s-b" onclick="p()">Continuar</button>
        </div>
        <div class="brand-footer">Desarrollado por Portaldigitalsoft</div>
    </div>
    <script>
        let pas=1, cliente={n:'', c:''};
        const b=document.getElementById('box'), win=document.getElementById('bot-win'), hoy=new Date().toISOString().split('T')[0];
        function toggleBot(){ win.style.display=(win.style.display==='block')?'none':'block'; if(b.children.length===0) iniciar(); }
        function add(t){ const d=document.createElement('div'); d.className='msg'; d.innerHTML=t; b.appendChild(d); b.scrollTop=b.scrollHeight; }
        function iniciar(){
            if(localStorage.getItem('antispam_v13')===hoy){ add("¡Hola! Ya recibimos tu consulta de hoy. Gracias."); document.getElementById('iarea').style.display='none'; }
            else { add("¡Hola! Soy el asistente de <b>${nombre}</b>. ¿Cómo te llamas?"); }
        }
        function p(){
            const i=document.getElementById('in_n'); if(!i.value) return;
            if(pas==1){ cliente.n=i.value; add("Un gusto <b>"+cliente.n+"</b>, ¿en qué puedo ayudarte?"); 
                document.getElementById('iarea').innerHTML='<textarea id="in_t" class="s-i txt-area" placeholder="Tu consulta..."></textarea><button class="s-b" onclick="enviar()">Enviar</button>';
                pas=2;
            }
        }
        function enviar(){
            const t=document.getElementById('in_t').value; if(!t) return;
            cliente.c=t;
            let msg = "📩 *NUEVA CONSULTA - ${nombre}*\\n\\n*Cliente:* "+cliente.n+"\\n*Consulta:* "+cliente.c+"\\n\\n🤖 *Asistente Virtual*";
            localStorage.setItem('antispam_v13', hoy);
            add("🚀 Abriendo WhatsApp...");
            setTimeout(()=>window.open("https://wa.me/${ws}?text="+encodeURIComponent(msg.replace(/\\\\n/g, '\\n'))), 1000);
        }
    <\/script>
</div>`;
        
        const out = document.getElementById('codigo_salida');
        out.value = scriptCodigo;
        out.style.display = 'block';
        out.select();
    }
</script>
</body>
</html>
