<div id="sob_mod">
    <style>
        #sob_mod * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* BOTÓN FLOTANTE (LAUNCHER) */
        #bot-launcher {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: #000;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #bot-launcher:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        #bot-launcher img { width: 75%; height: 75%; object-fit: contain; }

        /* VENTANA DE CHAT FLOTANTE */
        #bot-window { 
            display: none; 
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 350px; 
            max-width: calc(100vw - 50px);
            border: 1px solid rgba(212, 175, 55, 0.5); 
            padding: 20px; 
            border-radius: 24px; 
            background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px);
            color: white; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            z-index: 9998;
            animation: botFadeUp 0.4s ease-out;
        }

        @keyframes botFadeUp { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* CABECERA */
        #sob_mod .bot-h { display:flex; align-items:center; gap:12px; margin-bottom:15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:12px; position: relative; }
        #sob_mod .bot-img-h { width:45px; height:45px; border-radius:50%; border:1px solid #D4AF37; background: #111; padding: 2px; }
        #sob_mod .close-bot { position: absolute; top: 0; right: 0; cursor: pointer; color: #D4AF37; font-size: 1.5rem; line-height: 1; opacity: 0.7; transition: 0.3s; }
        #sob_mod .close-bot:hover { opacity: 1; }

        /* CAJA DE CHAT */
        #sob_mod .chat-box { height:280px; overflow-y:auto; margin-bottom:15px; display:flex; flex-direction:column; scroll-behavior: smooth; }
        #sob_mod .chat-box::-webkit-scrollbar { width: 4px; }
        #sob_mod .chat-box::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        #sob_mod .msg { background: rgba(255,255,255,0.07); padding:12px 15px; border-radius:18px 18px 18px 2px; border-left:3px solid #D4AF37; margin-bottom:12px; font-size:0.95rem; line-height:1.4; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

        /* INPUTS Y BOTÓN */
        #sob_mod .s-i { width:100%; padding:14px; border:1px solid rgba(212, 175, 55, 0.6); border-radius:14px; background: rgba(255,255,255,0.05); color:white; font-size:16px; margin-bottom:12px; outline:none; transition: 0.3s; }
        #sob_mod .s-i:focus { border-color: #D4AF37; background: rgba(255,255,255,0.1); }
        #sob_mod .s-b { width:100%; padding:16px; background:#D4AF37; border:none; border-radius:14px; color:#000; font-weight:bold; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition: 0.3s; }
        #sob_mod .s-b:hover { background: #f1c40f; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        #sob_mod .txt-area { height: 90px; resize: none; }

        /* FIRMA AGENCIA */
        #sob_mod .brand-footer { text-align:center; font-size:0.6rem; color:rgba(255,255,255,0.3); margin-top:10px; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>

    <div id="bot-launcher" onclick="toggleBot()">
        <img src="https://i.ibb.co/pjL8062t/ei-1776373504277-removebg-preview.png" alt="Asistente">
    </div>

    <div id="bot-window">
        <span class="close-bot" onclick="toggleBot()">&times;</span>
        <div class="bot-h">
            <img src="https://i.ibb.co/pjL8062t/ei-1776373504277-removebg-preview.png" class="bot-img-h">
            <div>
                <div style="font-weight:bold; font-size:0.9rem; color:#D4AF37;">Asistente Virtual</div>
                <div style="font-size:0.65rem; color:#00ff41;">● En línea</div>
            </div>
        </div>
        
        <div id="box" class="chat-box"></div>
        
        <div id="iarea">
            <input type="text" id="in_name" class="s-i" placeholder="¿Tu nombre?">
            <button class="s-b" onclick="p()">Continuar</button>
        </div>
        
        <div class="brand-footer">Desarrollado por Portaldigitalsoft</div>
    </div>

    <script>
        let pas = 1, cliente = { n: '', c: '' };
        const b = document.getElementById('box'), hoy = new Date().toISOString().split('T')[0];
        const botWin = document.getElementById('bot-window');

        // Cambia visibilidad del chat
        function toggleBot() {
            if (botWin.style.display === 'block') {
                botWin.style.display = 'none';
            } else {
                botWin.style.display = 'block';
                // Si es la primera vez que abre, saluda
                if(b.children.length === 0) iniciarChat();
            }
        }

        function add(t) { 
            const d = document.createElement('div'); 
            d.className = 'msg'; 
            d.innerHTML = t; 
            b.appendChild(d); 
            b.scrollTop = b.scrollHeight; 
        }

        function iniciarChat() {
            if(localStorage.getItem('antispam_v13') === hoy) {
                add("¡Hola! Ya recibimos tu consulta de hoy. Pronto nos comunicaremos contigo.");
                document.getElementById('iarea').style.display = 'none';
            } else {
                add("¡Hola! Soy tu asistente virtual. Para comenzar, <b>¿cómo es tu nombre?</b>");
            }
        }

        function p() {
            const i = document.getElementById('in_name'); 
            let v = i.value.trim(); 
            if(!v) return;
            if(pas === 1) { 
                cliente.n = v; 
                add("Un gusto <b>" + v + "</b>, ¿en qué puedo ayudarte?, ¿cuál es tu consulta?"); 
                document.getElementById('iarea').innerHTML = `
                    <textarea id="in_txt" class="s-i txt-area" placeholder="Escribe aquí tu consulta..."></textarea>
                    <button class="s-b" onclick="enviar()">Enviar Consulta</button>
                `;
                pas = 2;
                setTimeout(() => document.getElementById('in_txt').focus(), 300);
            }
        }

        function enviar() {
            const txt = document.getElementById('in_txt').value.trim(); 
            if(!txt) return;
            cliente.c = txt;
            
            // TICKET LIMPIO PARA WHATSAPP
            let ticket = "📩 *NUEVA CONSULTA*\n\n";
            ticket += "*Cliente:* " + cliente.n + "\n";
            ticket += "*Consulta:* " + cliente.c + "\n\n";
            ticket += "--- \n";
            ticket += "🤖 *Consulta procesada por Asistente Virtual*\n";
            ticket += "*Acción requerida:* Responder para coordinar.";

            localStorage.setItem('antispam_v13', hoy);
            add("🚀 <b>¡Perfecto!</b> Redirigiendo a WhatsApp...");
            
            // Cambia el número aquí por el del cliente final en tu Builder
            const ws_destino = "5493764369001"; 
            
            setTimeout(() => {
                window.open("https://wa.me/" + ws_destino + "?text=" + encodeURIComponent(ticket));
                toggleBot(); // Cierra el chat tras enviar
            }, 1200);
        }
    </script>
</div>
